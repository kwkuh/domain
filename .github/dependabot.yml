version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    groups:
      types:
        patterns: ["@types/*"]
      dev:
        dependency-type: "development"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    labels: ["ci"]

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: monthly
    labels: ["docker"]
